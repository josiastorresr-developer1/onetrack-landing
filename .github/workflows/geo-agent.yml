name: GEO Content Agent

on:
  schedule:
    # Diario 9:00 AM México (UTC-6) = 15:00 UTC
    - cron: "0 15 * * *"
  workflow_dispatch: # permite correrlo manualmente desde GitHub

jobs:
  generate-article:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run GEO agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_OAUTH_CREDENTIALS: ${{ secrets.GOOGLE_OAUTH_CREDENTIALS }}
        run: python agent/generate_article.py

      - name: Commit and push
        run: |
          git config user.name "GEO Agent"
          git config user.email "geo-agent@onetrack.lat"

          # Read slug generated by the agent
          SLUG=$(cat .geo_last_slug 2>/dev/null || echo "new-article")
          rm -f .geo_last_slug

          git add blog/ sitemap.xml agent/topics.json index.html

          # Only commit if there are staged changes
          if git diff --staged --quiet; then
            echo "Sin cambios para commitear"
          else
            git commit -m "blog: add ${SLUG} [skip ci]"
            git push
          fi
